name: Build & Deploy GOVERNANCE

on:
  push:
    branches: [main]
    paths:
      - 'services/governance/sections/**'
      - '.github/workflows/build-governance.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Assemble GOVERNANCE from independently deployable sections
        run: |
          set -euo pipefail
          out=.github/GOVERNANCE.md
          banner='<!-- GENERATED ARTIFACT — do not hand-edit. Source of truth: services/governance/sections/*.md. Redeployed by .github/workflows/build-governance.yml -->'
          tmp="$(mktemp)"
          printf '%s\n\n' "$banner" > "$tmp"
          first=1
          for f in services/governance/sections/*.md; do
            if [ "$first" -eq 0 ]; then printf '\n---\n\n' >> "$tmp"; fi
            cat "$f" >> "$tmp"
            first=0
          done
          mv "$tmp" "$out"

      - name: Redeploy artifact if it drifted from source
        run: |
          set -euo pipefail
          git add -f .github/GOVERNANCE.md
          if git diff --cached --quiet; then
            echo "No drift detected. GOVERNANCE artifact already up to date"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'chore(governance): redeploy generated artifact to production'
          git push origin HEAD:${{ github.ref_name }}

name: Build & Deploy SECURITY

on:
  push:
    branches: [main]
    paths:
      - 'services/security/sections/**'
      - '.github/workflows/build-security.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6

      - name: Assemble SECURITY from independently deployable sections
        run: |
          set -euo pipefail
          out=.github/SECURITY.md
          banner='<!-- GENERATED ARTIFACT — do not hand-edit. Source of truth: services/security/sections/*.md. Redeployed by .github/workflows/build-security.yml -->'
          tmp="$(mktemp)"
          printf '%s\n\n' "$banner" > "$tmp"
          first=1
          for f in services/security/sections/*.md; do
            if [ "$first" -eq 0 ]; then printf '\n---\n\n' >> "$tmp"; fi
            cat "$f" >> "$tmp"
            first=0
          done
          mv "$tmp" "$out"

      - name: Redeploy artifact if it drifted from source
        run: |
          set -euo pipefail
          git add -f .github/SECURITY.md
          if git diff --cached --quiet; then
            echo "No drift detected. SECURITY artifact already up to date"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'chore(security): redeploy generated artifact to production'
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:${{ github.ref_name }}; then exit 0; fi
            echo "Push rejected; rebasing on concurrent deploys and retrying (attempt $attempt)."
            git pull --rebase origin ${{ github.ref_name }}
          done
          echo "Failed to deploy artifact after multiple attempts." >&2
          exit 1
